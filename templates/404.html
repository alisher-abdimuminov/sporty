{% load static %}
{% load i18n %}
{% get_current_language as LANGUAGE_CODE %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>404</title>

    <!-- Custom fonts -->
    <link href="{% static 'assets/vendor/fontawesome-free/css/all.min.css' %}" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">

    <!-- Custom styles -->
    <link rel="stylesheet" href="{% static 'assets/css/sb-admin-2.min.css' %}">

    <style>
        /* Page height to ensure footer stays at bottom */
        html, body {
            height: 100%;
        }
        #content-wrapper {
            min-height: 100vh; /* Ensures it takes full height */
            display: flex;
            flex-direction: column;
        }
        #content {
            flex-grow: 1; /* Pushes footer to bottom */
        }
    </style>
</head>

<body id="page-top">

    <div id="wrapper">
        <div id="content-wrapper">
            <div id="content">
                <div class="container-fluid text-center">
                    <div class="error mx-auto" data-text="404">404</div>
                    <p class="lead text-gray-800 mb-5">Page Not Found</p>
                    <p class="text-gray-500 mb-0">It looks like you found a glitch in the matrix...</p>
                    <a href="{% url 'login' %}" class="btn btn-primary">&larr; Back to Login</a>
                </div>
            </div>

            <!-- Footer -->
            <footer class="sticky-footer bg-white">
                <div class="container my-auto text-center">
                    <!-- <span>Copyright &copy; Your Website {% now "Y" %}</span> -->
                    <span>Copyright &copy; {% now "Y" %}. Barcha huquqlar himoyalangan</span>
                </div>
            </footer>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="{% static 'assets/vendor/jquery/jquery.min.js' %}"></script>
    <script src="{% static 'assets/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'assets/vendor/jquery-easing/jquery.easing.min.js' %}"></script>
    <script src="{% static 'assets/js/sb-admin-2.min.js' %}"></script>

</body>
</html>
