<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fakultetlar ro'yxati</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            padding-top: 50px;
        }
        .faculty-card {
            max-width: 600px;
            margin: auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            padding: 30px;
        }
        .faculty-link {
            display: block;
            padding: 10px;
            text-decoration: none;
            color: #0d6efd;
            border-bottom: 1px solid #eee;
        }
        .faculty-link:hover {
            background: #f1f1f1;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="faculty-card">
        <h4 class="mb-4 text-center">Fakultetlar ro'yxati</h4>
        {% for name in faculties %}
            <a class="faculty-link" href="{% url 'faculty_detail' name %}">{{ name }}</a>
        {% endfor %}
    </div>
</body>
</html>
